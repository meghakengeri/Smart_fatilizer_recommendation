<!DOCTYPE html>
<html lang="{{ cur_lang or 'en' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4A7C59">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="{{ url_for('manifest') }}">
<title>{{ t.app_name }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="field-backdrop"></div>

<header class="topbar">
  <div class="topbar-inner">
    <span class="brand-mark">🌾</span>
    <span class="brand-name">{{ t.app_name }}</span>
  </div>
</header>

<!-- Growth-stage progress indicator: the signature element.
     A seedling grows one stage taller for each of the 5 pages, echoing
     the crop-growth-stage guidance described in the report. -->
<div class="growth-track" role="img" aria-label="Step {{ stage }} of 5">
  {% set labels = ['Details','Confirm','Fertilizer','Duration','Vendors'] %}
  {% for i in range(1,6) %}
    <div class="growth-step {{ 'is-done' if i < stage else '' }} {{ 'is-current' if i == stage else '' }}">
      <svg viewBox="0 0 40 40" class="growth-plant">
        <line x1="20" y1="38" x2="20" y2="{{ 38 - (i*4) }}" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        {% if i >= 2 %}<path d="M20 {{ 38 - (i*4) + 6 }} C 10 {{ 34 - (i*4) }}, 8 {{ 26 - (i*4) }}, 16 {{ 24 - (i*4) }}" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>{% endif %}
        {% if i >= 3 %}<path d="M20 {{ 38 - (i*4) + 2 }} C 30 {{ 34 - (i*4) }}, 32 {{ 26 - (i*4) }}, 24 {{ 24 - (i*4) }}" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>{% endif %}
        {% if i >= 4 %}<circle cx="20" cy="{{ 38 - (i*4) - 4 }}" r="3.4" fill="currentColor"/>{% endif %}
        {% if i >= 5 %}<circle cx="14" cy="{{ 38 - (i*4) - 2 }}" r="2.4" fill="currentColor"/><circle cx="26" cy="{{ 38 - (i*4) - 2 }}" r="2.4" fill="currentColor"/>{% endif %}
      </svg>
      <span class="growth-label">{{ labels[i-1] }}</span>
    </div>
    {% if i < 5 %}<div class="growth-connector {{ 'is-done' if i < stage else '' }}"></div>{% endif %}
  {% endfor %}
</div>

<main class="page-shell">
  <div class="card">
    {% block content %}{% endblock %}
  </div>
</main>

<footer class="footer-note"> Smart Fertilizer Recommendation</footer>

</body>
</html>
